<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SSH Web Client</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1><span class="logo-icon">⌨️</span> SSH Client</h1>
    <p class="login-subtitle">Secure self-hosted terminal access</p>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary login-btn">Sign In</button>
    </form>

    <div id="errorMsg" class="error-msg" role="alert"></div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
