<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Logs — SSH Client</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="logs-layout">
  <header class="header">
    <div class="header-logo">
      <span class="logo-icon">⌨️</span>
      <span>SSH Client</span>
    </div>
    <div class="header-spacer"></div>
    <a href="/" class="btn-ghost" style="font-size:12px">← Terminal</a>
    <button id="logoutBtn" class="btn-ghost" style="font-size:12px">Sign out</button>
  </header>

  <div class="logs-body">
    <aside class="logs-sidebar">
      <div class="logs-sidebar-header">Session Logs</div>
      <div class="log-file-list" id="logFileList">
        <div style="color:var(--text-dim); font-size:12px; padding:16px; text-align:center">Loading…</div>
      </div>
    </aside>

    <section class="log-content-area">
      <div class="log-content-header" id="logHeader" style="display:none">
        <span class="log-content-filename" id="logFilename"></span>
        <button class="btn-danger" id="deleteLogBtn" style="font-size:12px">Delete</button>
      </div>
      <div class="log-empty" id="logEmpty">Select a log file to view</div>
      <pre class="log-viewer" id="logViewer" style="display:none"></pre>
    </section>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
(async () => {
  // Auth check
  try {
    const r = await fetch('/api/auth/me');
    if (!r.ok) { window.location.href = '/login'; return; }
  } catch { window.location.href = '/login'; return; }

  function toast(msg, type = '') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  let activeFile = null;

  async function loadList() {
    const res = await fetch('/api/logs');
    if (!res.ok) return;
    const files = await res.json();
    const list = document.getElementById('logFileList');

    if (files.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim); font-size:12px; padding:16px; text-align:center">No log files yet</div>';
      return;
    }

    list.innerHTML = files.map(f => `
      <div class="log-file-item" data-name="${f.name}">
        <span class="log-file-name">${f.name}</span>
        <span class="log-file-meta">${formatSize(f.size)} · ${formatDate(f.modified)}</span>
      </div>
    `).join('');

    list.querySelectorAll('.log-file-item').forEach(el => {
      el.addEventListener('click', () => openLog(el.dataset.name, el));
    });
  }

  async function openLog(name, el) {
    list.querySelectorAll('.log-file-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    activeFile = name;

    const res = await fetch(`/api/logs/${encodeURIComponent(name)}`);
    if (!res.ok) { toast('Failed to load log', 'error'); return; }
    const { content } = await res.json();

    document.getElementById('logFilename').textContent = name;
    document.getElementById('logHeader').style.display = 'flex';
    document.getElementById('logEmpty').style.display = 'none';
    const viewer = document.getElementById('logViewer');
    viewer.style.display = 'block';
    // Strip ANSI escape codes for readability
    viewer.textContent = content.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
  }

  const list = document.getElementById('logFileList');

  document.getElementById('deleteLogBtn').addEventListener('click', async () => {
    if (!activeFile || !confirm(`Delete log "${activeFile}"?`)) return;
    const res = await fetch(`/api/logs/${encodeURIComponent(activeFile)}`, { method: 'DELETE' });
    if (res.ok) {
      toast('Log deleted', 'success');
      activeFile = null;
      document.getElementById('logHeader').style.display = 'none';
      document.getElementById('logViewer').style.display = 'none';
      document.getElementById('logEmpty').style.display = 'flex';
      await loadList();
    } else {
      toast('Failed to delete log', 'error');
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  });

  function formatSize(bytes) {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
  }

  function formatDate(d) {
    return new Date(d).toLocaleString();
  }

  loadList();
})();
</script>
</body>
</html>
